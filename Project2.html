<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Planner App</title>

    <link rel="stylesheet" href="Project2.css">
</head>
<body>
    <div class="container">
    <h2>My Daily Planner</h2>
    
    <input type="text" id="searchInput"placeholder="Search task....">
    <button id="allBtn">All</button>
    <button id="completedBtn">Complete</button>
    <button id="pendingBtn">Pending</button>
    <input type="text" id="taskInput" placeholder="Enter task here">
    <input type="time"  id="timeInput"placeholder="select the time">
    <button id="addbtn">Add Task</button>
    <button id="clearBtn">Clear Completed</button>
    <ul id="taskList"></ul>
    <p id="stats"></p>
    </div>
    
    


    <script src="Project2.js"></script>
</body>
   
</html>
